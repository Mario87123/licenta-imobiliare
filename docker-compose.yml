services:
  backend:
    build:
      context: ./Backend
    container_name: imobiliare-backend
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/app.db
      ML_MODEL_DIR: /data/ml_models
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Imobiliare Timisoara}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      - ./deploy-data:/data
    ports:
      - "8000:8000"
